# Nginx Configuration for Asklyze Landing Page
# Reverse proxy with SSL termination for Next.js application

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=contact_limit:10m rate=2r/m;

# Upstream Next.js application
upstream nextjs_app {
    server localhost:3076;
    keepalive 32;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name asklyze.ai www.asklyze.ai;

    # Allow Let's Encrypt challenges
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://asklyze.ai$request_uri;
    }
}

# HTTPS canonical host redirect (www -> apex)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.asklyze.ai;

    ssl_certificate /etc/letsencrypt/live/asklyze.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asklyze.ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/asklyze.ai/chain.pem;

    return 301 https://asklyze.ai$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name asklyze.ai;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/asklyze.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asklyze.ai/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/asklyze.ai/chain.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Client body size limit
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/asklyze-landing-access.log;
    error_log /var/log/nginx/asklyze-landing-error.log warn;

    # Root location - proxy to Next.js
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
    }

    # API routes with rate limiting
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable caching for API routes
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Contact form - stricter rate limiting
    location /api/contact {
        limit_req zone=contact_limit burst=5 nodelay;
        limit_req_status 429;
        
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files from Next.js - aggressive caching
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Cache static assets for 1 year
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # Public static files - moderate caching
    location /public/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    # Favicon
    location = /favicon.ico {
        proxy_pass http://nextjs_app;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=86400";
    }

    # Robots.txt
    location = /robots.txt {
        proxy_pass http://nextjs_app;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=3600";
    }

    # Health check endpoint
    location /api/health {
        proxy_pass http://nextjs_app;
        access_log off;
    }

    # Payload CMS admin panel
    location /admin {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable caching for admin
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # GraphQL endpoint
    location /graphql {
        limit_req zone=api_limit burst=30 nodelay;
        
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
