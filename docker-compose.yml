version: "3.8"

services:
  app:
    image: ghcr.io/apex-experts/asklyze-landing:latest
    container_name: asklyze-landing
    restart: unless-stopped
    ports:
      - "3076:3076"
    environment:
      # These should be set via .env file or docker-compose override
      - NODE_ENV=production
      - PORT=3076
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - DATABASE_URI=${DATABASE_URI:-file:/app/data/payload-sqlite.db}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - MAIL_FROM=${MAIL_FROM}
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
      - PAYLOAD_CONFIG_PATH=/app/src/payload.config.ts
    volumes:
      # Persistent storage for SQLite database
      - ./data:/app/data
      # Persistent storage for uploaded media
      - ./media:/app/media
    networks:
      - asklyze-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3076/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  migrate:
    image: ghcr.io/apex-experts/asklyze-landing:latest
    env_file:
      - .env
    environment:
      - PAYLOAD_CONFIG_PATH=/app/src/payload.config.ts
    command: npx payload migrate
    networks:
      - asklyze-network

networks:
  asklyze-network:
    driver: bridge

volumes:
  data:
  media:
