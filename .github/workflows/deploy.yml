name: Deploy to VPS

on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: apex-experts/asklyze-landing

jobs:
    build-and-push:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest
                      type=sha,prefix={{branch}}-
                      type=ref,event=branch
                      type=semver,pattern={{version}}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: linux/amd64

    deploy:
        name: Deploy to VPS
        needs: build-and-push
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Create .env file
              run: |
                  cat > .env << EOF
                  PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
                  DATABASE_URI=file:/app/data/payload-sqlite.db
                  AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
                  MAIL_FROM=${{ secrets.MAIL_FROM }}
                  NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}
                  EOF

            - name: Copy files to VPS
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.VPS_PORT || 22 }}
                  source: "docker-compose.yml,.env"
                  target: "/opt/asklyze-landing"

            - name: Deploy on VPS
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.VPS_PORT || 22 }}
                  script: |
                      cd /opt/asklyze-landing

                      # Login to GitHub Container Registry
                      echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

                      # Pull the latest image
                      docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

                      # Stop and remove old container
                      docker-compose down

                      # Start new container
                      docker-compose up -d

                      # Clean up old images
                      docker image prune -af

                      # Wait for health check
                      echo "Waiting for container to be healthy..."
                      timeout 60 sh -c 'until docker ps | grep asklyze-landing | grep -q healthy; do sleep 2; done' || {
                        echo "Container failed to become healthy"
                        docker-compose logs
                        exit 1
                      }

                      echo "Deployment successful!"

            - name: Health Check
              run: |
                  sleep 10
                  curl -f ${{ secrets.NEXT_PUBLIC_SERVER_URL }}/api/health || exit 1

            - name: Deployment notification
              if: always()
              run: |
                  if [ ${{ job.status }} == 'success' ]; then
                    echo "✅ Deployment succeeded"
                  else
                    echo "❌ Deployment failed"
                  fi
