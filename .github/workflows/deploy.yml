name: 🚀 Deploy Asklyze to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-asklyze
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: asklyze-landing
  IMAGE_NAME: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apex-repo/asklyze-landing

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min
          platforms: linux/amd64
          build-args: |
            DATABASE_URI="${{ secrets.ASKLYZE_DATABASE_URL }}"
            PAYLOAD_SECRET="${{ secrets.PAYLOAD_SECRET }}"
            NEXT_PUBLIC_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"

      - name: Create Environment File
        run: |
          cat <<'EOF' > env.yaml  
          NODE_ENV: "production"
          DATABASE_URI: "${{ secrets.ASKLYZE_DATABASE_URL }}"
          PAYLOAD_SECRET: "${{ secrets.PAYLOAD_SECRET }}"
          SENDGRID_API_KEY: "${{ secrets.SENDGRID_API_KEY}}"
          MAIL_FROM: "${{ secrets.MAIL_FROM}}"
          NEXT_PUBLIC_SITE_URL: "${{ secrets.NEXT_PUBLIC_SITE_URL}}"
          EOF

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --region ${{ env.REGION }} \
            --env-vars-file env.yaml \
            --vpc-connector myquery-vpc-conn \
            --execution-environment gen2 \
            --memory 1Gi \
            --cpu 1 \
            --port 3076 \
            --allow-unauthenticated
